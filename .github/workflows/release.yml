# Hunch — trusted npm release. Repository code is tested, built, and packed in
# a job that cannot mint an OIDC token. Independent Windows and macOS jobs prove
# native/atomic/Matrix safety on the exact tag. A final minimal job receives only
# the content-addressed candidate and publishes those exact bytes with provenance.
#
# One-time npm setup for @davesheffer/hunch:
#   owner/repository: davesheffer/hunch
#   workflow: release.yml
#   environment: npm-publish
# Replace (do not retain) the old trusted-publisher binding without an
# environment. Once npm's trusted publisher requires environment `npm-publish`,
# historical workflow tags that lack that environment cannot authenticate.
# Do not configure NODE_AUTH_TOKEN or a long-lived npm automation token.
name: Release

on:
  push:
    tags: ["v[0-9]*"] # package versions only; vscode-v* is never an npm release

# OIDC is denied by default. Only the minimal publish job opts in below.
permissions:
  contents: read

# Serialize the package, not an individual tag. Together with the monotonic
# dist-tag check, this prevents an older run from racing a newer publication.
concurrency:
  group: hunch-npm-package
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Install (locked; no publication authority)
        run: npm ci

      - name: Run the full tagged release gate
        run: npm run gate:release -- --tag "${GITHUB_REF_NAME}" --output release-gate.json

      # The gate already built and tested dist/. Pack without running the
      # package's prepublish lifecycle again, then bind the exact tgz to the
      # release-gate and Matrix receipts.
      - name: Pack and attest the exact candidate
        shell: bash
        run: |
          mkdir -p release-candidate
          npm pack --ignore-scripts --json --pack-destination release-candidate > pack-result.json
          node --input-type=module <<'NODE'
          import { createHash } from "node:crypto";
          import { spawnSync } from "node:child_process";
          import {
            copyFileSync,
            readFileSync,
            renameSync,
            statSync,
            writeFileSync,
          } from "node:fs";
          import { basename, dirname, resolve } from "node:path";

          const PACKAGE_NAME = "@davesheffer/hunch";
          const WORKFLOW = ".github/workflows/release.yml";
          const candidateDirectory = resolve("release-candidate");

          const stable = (value) => {
            if (Array.isArray(value)) return value.map(stable);
            if (value && typeof value === "object") {
              return Object.fromEntries(Object.keys(value).sort().map((key) => [key, stable(value[key])]));
            }
            return value;
          };
          const sha256 = (value) => `sha256:${createHash("sha256").update(value).digest("hex")}`;
          const contentHash = (body) => sha256(JSON.stringify(stable(body)));
          const parseSemver = (value) => {
            const match = /^(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)(?:-((?:0|[1-9]\d*|\d*[A-Za-z-][0-9A-Za-z-]*)(?:\.(?:0|[1-9]\d*|\d*[A-Za-z-][0-9A-Za-z-]*))*))?(?:\+[0-9A-Za-z-]+(?:\.[0-9A-Za-z-]+)*)?$/.exec(value);
            if (!match) throw new Error(`refusing invalid package semver ${String(value)}`);
            return { prerelease: match[4] ?? null };
          };
          const verifyReleaseGate = (gate) => {
            if (!gate || typeof gate !== "object") throw new Error("release gate receipt is not an object");
            const { id, content_hash: observed, ...body } = gate;
            const expected = contentHash(body);
            if (observed !== expected || id !== `release_${expected.slice("sha256:".length, "sha256:".length + 12)}`) {
              throw new Error("release gate receipt content hash is invalid");
            }
          };
          const verifyMatrix = (matrix) => {
            if (!matrix || typeof matrix !== "object") throw new Error("release gate has no Matrix receipt");
            const { content_hash: observed, ...body } = matrix;
            if (observed !== contentHash(body)) throw new Error("Matrix receipt content hash is invalid");
          };

          const manifest = JSON.parse(readFileSync("package.json", "utf8"));
          if (manifest.name !== PACKAGE_NAME) throw new Error(`refusing unexpected package ${String(manifest.name)}`);
          const parsedVersion = parseSemver(manifest.version);
          if (process.env.GITHUB_REF_NAME !== `v${manifest.version}`) {
            throw new Error(`release tag ${process.env.GITHUB_REF_NAME} does not match package version ${manifest.version}`);
          }
          if (process.env.GITHUB_REF !== `refs/tags/v${manifest.version}`) throw new Error("release ref is not the exact package tag");

          const packResult = JSON.parse(readFileSync("pack-result.json", "utf8"));
          if (!Array.isArray(packResult) || packResult.length !== 1) throw new Error("npm pack did not produce exactly one candidate");
          const packed = packResult[0];
          if (packed.name !== PACKAGE_NAME || packed.version !== manifest.version) throw new Error("npm pack metadata does not match package.json");
          if (!Array.isArray(packed.files) || packed.files.length === 0) throw new Error("npm pack returned no file manifest");
          const packagePaths = packed.files.map((file) => file?.path);
          if (!packagePaths.every((path) => typeof path === "string") || new Set(packagePaths).size !== packagePaths.length) {
            throw new Error("npm pack returned malformed or duplicate package paths");
          }
          const requiredPaths = ["LICENSE", "NOTICE", "README.md", "package.json", "dist/cli/index.js"];
          for (const required of requiredPaths) {
            if (!packagePaths.includes(required)) throw new Error(`npm package is missing required path ${required}`);
          }
          const allowedPath = (path) => path === "LICENSE"
            || path === "NOTICE"
            || path === "README.md"
            || path === "package.json"
            || path === "bench/constitution-exp03-v1.json"
            || path === "tooling/competitive-watch.mjs"
            || path === "tooling/md1-benchmark.mjs"
            || /^dist\/.+\.js$/.test(path);
          const sensitivePath = (path) => /(^|\/)\.hunch(?:-cache)?(?:\/|$)/i.test(path)
            || /^wiki(?:\/|$)/i.test(path)
            || /(^|\/)\.env(?:\.|$)/i.test(path)
            || /(^|\/)(?:credentials?|secrets?|id_rsa|id_ed25519)(?:\.|$)/i.test(path)
            || /\.(?:pem|key|p12|pfx)$/i.test(path)
            || path.startsWith("/") || path.includes("\\") || path.split("/").some((part) => part === "." || part === "..");
          const forbiddenPaths = packagePaths.filter((path) => !allowedPath(path) || sensitivePath(path));
          if (forbiddenPaths.length > 0) {
            throw new Error(`npm package contains forbidden paths: ${forbiddenPaths.join(", ")}`);
          }
          const packagePathManifestSha256 = sha256(JSON.stringify([...packagePaths].sort()));
          const originalTarball = resolve(candidateDirectory, basename(String(packed.filename)));
          if (dirname(originalTarball) !== candidateDirectory) throw new Error("npm pack returned an unsafe filename");
          const tarballBytes = readFileSync(originalTarball);
          const tarballSha256 = sha256(tarballBytes);
          const tarballIntegrity = `sha512-${createHash("sha512").update(tarballBytes).digest("base64")}`;
          if (packed.integrity !== tarballIntegrity) throw new Error("npm pack integrity does not match the exact tgz bytes");

          const extracted = spawnSync("tar", ["-xOf", originalTarball, "package/package.json"], { encoding: "utf8" });
          if (extracted.status !== 0) throw new Error(`could not inspect packed package.json: ${extracted.stderr.trim()}`);
          const packedManifest = JSON.parse(extracted.stdout);
          if (packedManifest.name !== PACKAGE_NAME || packedManifest.version !== manifest.version) {
            throw new Error("packed package identity does not match the validated manifest");
          }

          const releaseGateBytes = readFileSync("release-gate.json");
          const releaseGate = JSON.parse(releaseGateBytes);
          verifyReleaseGate(releaseGate);
          verifyMatrix(releaseGate.matrix);
          if (releaseGate.result !== "passed" || releaseGate.publish_ready !== true) throw new Error("release gate is not publish-ready");
          if (releaseGate.package?.name !== PACKAGE_NAME || releaseGate.package?.version !== manifest.version) {
            throw new Error("release gate package identity does not match the candidate");
          }
          if (releaseGate.source?.commit !== process.env.GITHUB_SHA
            || releaseGate.source?.tag !== process.env.GITHUB_REF_NAME
            || releaseGate.source?.tag_commit_matches !== true
            || releaseGate.source?.clean !== true) {
            throw new Error("release gate source does not bind the tagged candidate commit");
          }
          const matrix = releaseGate.matrix;
          if (matrix.result !== "passed" || matrix.release_ready !== true
            || matrix.source?.candidate_commit !== process.env.GITHUB_SHA
            || matrix.source?.candidate_clean !== true
            || matrix.packages?.candidate?.version !== manifest.version) {
            throw new Error("Matrix receipt does not bind the tagged candidate commit");
          }
          if (matrix.packages?.candidate?.sha256 !== tarballSha256) {
            throw new Error("Matrix-tested package bytes differ from the release candidate tgz");
          }

          const normalizedTarball = resolve(candidateDirectory, "package.tgz");
          renameSync(originalTarball, normalizedTarball);
          copyFileSync("release-gate.json", resolve(candidateDirectory, "release-gate.json"));
          const body = {
            schema: "hunch.npm-release-candidate.v1",
            package: {
              name: PACKAGE_NAME,
              version: manifest.version,
              dist_tag: parsedVersion.prerelease === null ? "latest" : "next",
            },
            source: {
              repository: "davesheffer/hunch",
              commit: process.env.GITHUB_SHA,
              ref: process.env.GITHUB_REF,
              tag: process.env.GITHUB_REF_NAME,
              workflow: WORKFLOW,
            },
            release_gate: {
              release_gate_content_hash: releaseGate.content_hash,
              matrix_content_hash: matrix.content_hash,
              matrix_package_sha256: matrix.packages.candidate.sha256,
              file_sha256: sha256(releaseGateBytes),
            },
            artifact: {
              filename: "package.tgz",
              size: statSync(normalizedTarball).size,
              tarball_sha256: tarballSha256,
              tarball_integrity: tarballIntegrity,
              package_path_manifest_sha256: packagePathManifestSha256,
            },
          };
          writeFileSync(
            resolve(candidateDirectory, "release-candidate-manifest.json"),
            JSON.stringify({ ...body, content_hash: contentHash(body) }, null, 2) + "\n",
          );
          NODE

      - name: Upload immutable release candidate
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          # Keep the name stable across a "rerun failed jobs" attempt so the
          # publish job can reuse a successful validation artifact. A full
          # rerun replaces it with a newly validated artifact from the same ref.
          name: npm-release-candidate-${{ github.run_id }}
          path: release-candidate
          if-no-files-found: error
          overwrite: true
          compression-level: 0
          retention-days: 7

  platform-matrix-safety:
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Verify the exact tagged commit
        run: node -e 'const {execFileSync}=require("node:child_process"); const tag=process.env.GITHUB_REF_NAME; if(!tag || process.env.GITHUB_REF!==`refs/tags/${tag}`) throw new Error("platform safety did not start from an exact tag ref"); const actual=execFileSync("git",["rev-parse","HEAD"],{encoding:"utf8"}).trim(); const tagged=execFileSync("git",["rev-list","-n","1",tag],{encoding:"utf8"}).trim(); if(actual!==process.env.GITHUB_SHA || tagged!==process.env.GITHUB_SHA) throw new Error(`platform checkout ${actual} and tag ${tag} -> ${tagged} must both match event commit ${process.env.GITHUB_SHA}`);'

      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: 22
          cache: npm

      - name: Install (locked; no publication authority)
        run: npm ci

      - name: Native bindings, atomic writes, and the team Matrix stay safe
        id: matrix-safety
        run: npx --no-install tsx --test --test-concurrency=1 test/parse.test.ts test/io.test.ts test/migrate.test.ts test/matrix-release-verification.test.ts test/team-matrix-e2e.test.ts

      - name: Write tagged platform Matrix safety receipt
        if: always()
        env:
          MATRIX_SAFETY_OUTCOME: ${{ steps.matrix-safety.outcome }}
          MATRIX_RUNNER_OS: ${{ runner.os }}
        run: node -e 'const fs=require("node:fs"),crypto=require("node:crypto"); const body={schema:"hunch.tagged-platform-matrix-safety.v1",commit:process.env.GITHUB_SHA,ref:process.env.GITHUB_REF,node:process.version,runner_os:process.env.MATRIX_RUNNER_OS,outcome:process.env.MATRIX_SAFETY_OUTCOME,tests:["test/parse.test.ts","test/io.test.ts","test/migrate.test.ts","test/matrix-release-verification.test.ts","test/team-matrix-e2e.test.ts"]}; const content_hash="sha256:"+crypto.createHash("sha256").update(JSON.stringify(body)).digest("hex"); fs.writeFileSync("tagged-platform-matrix-safety.json",JSON.stringify({...body,content_hash},null,2)+"\n");'

      - name: Upload tagged platform Matrix safety receipt
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: tagged-platform-matrix-safety-${{ matrix.os }}-${{ github.sha }}-${{ github.run_id }}
          path: tagged-platform-matrix-safety.json
          if-no-files-found: error

  publish:
    needs: [validate, platform-matrix-safety]
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: read
      id-token: write
    steps:
      # This job intentionally has no source tree, dependency installation,
      # build command, local module import, or repository script execution.
      - name: Download exact validated candidate
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: npm-release-candidate-${{ github.run_id }}
          path: release-candidate

      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      # npm trusted publishing currently requires npm >=11.5.1 and Node >=22.14.
      - name: Verify trusted-publishing toolchain
        run: node -e 'const {execFileSync}=require("node:child_process"); const parse=(v)=>v.trim().split(".").map(Number); const atLeast=(v,min)=>{for(let i=0;i<min.length;i+=1){if(v[i]!==min[i])return v[i]>min[i];}return true;}; const node=parse(process.versions.node), npm=parse(execFileSync("npm",["--version"],{encoding:"utf8"})); if (!atLeast(node,[22,14,0])) throw new Error(`trusted publishing requires Node >=22.14.0; found ${process.versions.node}`); if (!atLeast(npm,[11,5,1])) throw new Error(`trusted publishing requires npm >=11.5.1; found ${npm.join(".")}`);'

      - name: Publish exact validated tarball and verify registry
        shell: bash
        run: |
          node --input-type=module <<'NODE'
          import { createHash } from "node:crypto";
          import { spawnSync } from "node:child_process";
          import {
            mkdtempSync,
            readFileSync,
            readdirSync,
            rmSync,
            statSync,
            writeFileSync,
          } from "node:fs";
          import { tmpdir } from "node:os";
          import { join, resolve } from "node:path";
          import { setTimeout as delay } from "node:timers/promises";

          const PACKAGE_NAME = "@davesheffer/hunch";
          const REPOSITORY = "davesheffer/hunch";
          const WORKFLOW = ".github/workflows/release.yml";
          const REGISTRY = "https://registry.npmjs.org/";
          const SLSA_PREDICATE = "https://slsa.dev/provenance/v1";
          const candidateDirectory = resolve("release-candidate");
          const tarballPath = resolve(candidateDirectory, "package.tgz");

          for (const tokenName of ["NODE_AUTH_TOKEN", "NPM_TOKEN", "NPM_AUTH_TOKEN"]) {
            if (process.env[tokenName]) throw new Error(`long-lived npm credential ${tokenName} is forbidden`);
          }
          const nonPublishingEnvironment = { ...process.env };
          delete nonPublishingEnvironment.ACTIONS_ID_TOKEN_REQUEST_URL;
          delete nonPublishingEnvironment.ACTIONS_ID_TOKEN_REQUEST_TOKEN;

          const stable = (value) => {
            if (Array.isArray(value)) return value.map(stable);
            if (value && typeof value === "object") {
              return Object.fromEntries(Object.keys(value).sort().map((key) => [key, stable(value[key])]));
            }
            return value;
          };
          const sha256 = (value) => `sha256:${createHash("sha256").update(value).digest("hex")}`;
          const contentHash = (body) => sha256(JSON.stringify(stable(body)));
          const parseSemver = (value) => {
            const match = /^(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)(?:-((?:0|[1-9]\d*|\d*[A-Za-z-][0-9A-Za-z-]*)(?:\.(?:0|[1-9]\d*|\d*[A-Za-z-][0-9A-Za-z-]*))*))?(?:\+[0-9A-Za-z-]+(?:\.[0-9A-Za-z-]+)*)?$/.exec(value);
            if (!match) throw new Error(`invalid semver ${String(value)}`);
            return {
              major: BigInt(match[1]), minor: BigInt(match[2]), patch: BigInt(match[3]),
              prerelease: match[4] === undefined ? [] : match[4].split("."),
            };
          };
          const compareSemver = (leftValue, rightValue) => {
            const left = parseSemver(leftValue);
            const right = parseSemver(rightValue);
            for (const field of ["major", "minor", "patch"]) {
              if (left[field] !== right[field]) return left[field] < right[field] ? -1 : 1;
            }
            if (left.prerelease.length === 0 || right.prerelease.length === 0) {
              return left.prerelease.length === right.prerelease.length ? 0 : left.prerelease.length === 0 ? 1 : -1;
            }
            const length = Math.max(left.prerelease.length, right.prerelease.length);
            for (let index = 0; index < length; index += 1) {
              const leftPart = left.prerelease[index];
              const rightPart = right.prerelease[index];
              if (leftPart === undefined || rightPart === undefined) return leftPart === undefined ? -1 : 1;
              if (leftPart === rightPart) continue;
              const leftNumeric = /^\d+$/.test(leftPart);
              const rightNumeric = /^\d+$/.test(rightPart);
              if (leftNumeric && rightNumeric) return BigInt(leftPart) < BigInt(rightPart) ? -1 : 1;
              if (leftNumeric !== rightNumeric) return leftNumeric ? -1 : 1;
              return leftPart < rightPart ? -1 : 1;
            }
            return 0;
          };
          const parseJson = (value, label) => {
            try { return JSON.parse(value); }
            catch { throw new Error(`npm registry lookup failed closed: ${label} returned invalid JSON`); }
          };
          const npmView = (args, label) => {
            const query = spawnSync("npm", ["view", ...args, `--registry=${REGISTRY}`], {
              env: nonPublishingEnvironment, encoding: "utf8", timeout: 30_000, maxBuffer: 4 * 1024 * 1024,
            });
            if (query.error) throw new Error(`npm registry lookup failed closed: ${label}: ${query.error.message}`);
            return query;
          };
          const exactDist = (name, version) => {
            const spec = `${name}@${version}`;
            const query = npmView([spec, "dist", "--json"], spec);
            if (query.status === 0) {
              const parsed = parseJson(query.stdout, spec);
              if (!parsed || typeof parsed !== "object" || Array.isArray(parsed)) {
                throw new Error(`npm registry lookup failed closed: ${spec} returned malformed dist metadata`);
              }
              return parsed;
            }
            const failure = `${query.stderr}\n${query.stdout}`;
            if (/\bE404\b|404 Not Found/.test(failure)) return null;
            throw new Error(`npm registry lookup failed closed: ${spec}: ${failure.trim()}`);
          };
          const distTags = (name) => {
            const query = npmView([name, "dist-tags", "--json"], `${name} dist-tags`);
            if (query.status !== 0) {
              throw new Error(`npm registry lookup failed closed: ${name} dist-tags: ${`${query.stderr}\n${query.stdout}`.trim()}`);
            }
            const parsed = parseJson(query.stdout, `${name} dist-tags`);
            if (!parsed || typeof parsed !== "object" || Array.isArray(parsed)) {
              throw new Error(`npm registry lookup failed closed: ${name} returned malformed dist-tags`);
            }
            return parsed;
          };
          const verifyReceiptHash = (receipt, label) => {
            const { content_hash: observed, ...body } = receipt;
            if (observed !== contentHash(body)) throw new Error(`${label} content hash is invalid`);
          };
          const inspectPackedManifest = () => {
            const extracted = spawnSync("tar", ["-xOf", tarballPath, "package/package.json"], {
              env: nonPublishingEnvironment, encoding: "utf8",
            });
            if (extracted.status !== 0) throw new Error(`could not inspect candidate tgz: ${extracted.stderr.trim()}`);
            return JSON.parse(extracted.stdout);
          };
          const inspectPackedPaths = () => {
            const listed = spawnSync("tar", ["-tzf", tarballPath], {
              env: nonPublishingEnvironment, encoding: "utf8",
            });
            if (listed.status !== 0) throw new Error(`could not list candidate tgz: ${listed.stderr.trim()}`);
            return listed.stdout.split("\n").filter((path) => path && !path.endsWith("/")).map((path) => {
              if (!path.startsWith("package/")) throw new Error(`candidate tgz has an unexpected archive path ${path}`);
              return path.slice("package/".length);
            }).sort();
          };
          const decodePayload = (encoded) => {
            try { return JSON.parse(Buffer.from(encoded, "base64").toString("utf8")); }
            catch { throw new Error("npm provenance attestation contains an invalid DSSE payload"); }
          };
          const decodedPurl = (value) => {
            try { return decodeURIComponent(value); } catch { return null; }
          };
          const escapeRegExp = (value) => value.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
          const verifySigstoreBundle = (bundle, manifest) => {
            const verificationDirectory = mkdtempSync(join(tmpdir(), "hunch-sigstore-verify-"));
            try {
              const bundlePath = join(verificationDirectory, "bundle.json");
              writeFileSync(bundlePath, JSON.stringify(bundle));
              const expectedIdentity = `https://github.com/${REPOSITORY}/${WORKFLOW}@${manifest.source.ref}`;
              const verifierSource = String.raw`
                const { spawnSync } = require("node:child_process");
                const { readFileSync, realpathSync } = require("node:fs");
                const { createRequire } = require("node:module");
                const { dirname, join, resolve } = require("node:path");
                (async () => {
                  const located = spawnSync("which", ["npm"], { encoding: "utf8" });
                  if (located.status !== 0 || !located.stdout.trim()) throw new Error("could not locate the trusted npm CLI");
                  const npmCli = realpathSync(located.stdout.trim().split(/\\r?\\n/)[0]);
                  const npmRoot = resolve(dirname(npmCli), "..");
                  const requireFromNpm = createRequire(join(npmRoot, "package.json"));
                  const sigstore = requireFromNpm("sigstore");
                  const sigstoreEntry = requireFromNpm.resolve("sigstore");
                  const sigstoreRoot = resolve(dirname(sigstoreEntry), "..");
                  const sigstoreManifest = JSON.parse(readFileSync(join(sigstoreRoot, "package.json"), "utf8"));
                  const bundle = JSON.parse(readFileSync(process.argv[1], "utf8"));
                  await sigstore.verify(bundle, {
                    certificateIssuer: "https://token.actions.githubusercontent.com",
                    certificateIdentityURI: new RegExp(process.argv[2]),
                    ctLogThreshold: 1,
                    tlogThreshold: 1,
                    timeout: 30_000,
                    retry: { retries: 2 },
                  });
                  process.stdout.write(JSON.stringify({ sigstore_version: sigstoreManifest.version }));
                })().catch((error) => { process.stderr.write(String(error?.stack ?? error)); process.exitCode = 1; });
              `;
              const verified = spawnSync(process.execPath, [
                "--input-type=commonjs", "-e", verifierSource,
                bundlePath, `^${escapeRegExp(expectedIdentity)}$`,
              ], {
                env: nonPublishingEnvironment,
                encoding: "utf8",
                timeout: 120_000,
                maxBuffer: 4 * 1024 * 1024,
              });
              if (verified.error) throw verified.error;
              if (verified.status !== 0) {
                throw new Error(`exact Sigstore bundle verification failed: ${`${verified.stderr}\n${verified.stdout}`.trim()}`);
              }
              const result = parseJson(verified.stdout, "exact Sigstore bundle verification");
              if (!/^\\d+\\.\\d+\\.\\d+/.test(result.sigstore_version ?? "")) {
                throw new Error("exact Sigstore bundle verification did not identify its verifier");
              }
              return result;
            } finally {
              rmSync(verificationDirectory, { recursive: true, force: true });
            }
          };
          const verifyRegistryEvidence = async (dist, manifest, tarballSha512Hex) => {
            if (dist.integrity !== manifest.artifact.tarball_integrity) {
              throw new Error(`registry integrity ${String(dist.integrity)} does not match the validated tgz`);
            }
            if (dist.attestations?.provenance?.predicateType !== SLSA_PREDICATE) {
              throw new Error("registry metadata has no SLSA provenance attestation");
            }
            const attestationUrl = new URL(String(dist.attestations?.url));
            if (attestationUrl.origin !== new URL(REGISTRY).origin
              || !attestationUrl.pathname.startsWith("/-/npm/v1/attestations/")
              || decodeURIComponent(attestationUrl.pathname.slice("/-/npm/v1/attestations/".length)) !== `${PACKAGE_NAME}@${manifest.package.version}`) {
              throw new Error("registry returned an unexpected attestation URL");
            }
            const response = await fetch(attestationUrl, {
              headers: { accept: "application/json" }, signal: AbortSignal.timeout(30_000),
            });
            if (!response.ok) throw new Error(`attestation lookup failed closed with HTTP ${response.status}`);
            const attestationBytes = Buffer.from(await response.arrayBuffer());
            const responseBody = parseJson(attestationBytes.toString("utf8"), "npm attestation");
            const provenance = responseBody.attestations?.find((entry) => entry.predicateType === SLSA_PREDICATE);
            if (!provenance?.bundle?.dsseEnvelope?.payload || provenance.bundle.dsseEnvelope.payloadType !== "application/vnd.in-toto+json"
              || !Array.isArray(provenance.bundle.dsseEnvelope.signatures) || provenance.bundle.dsseEnvelope.signatures.length === 0) {
              throw new Error("npm attestation response has no signed SLSA DSSE envelope");
            }
            const statement = decodePayload(provenance.bundle.dsseEnvelope.payload);
            if (statement._type !== "https://in-toto.io/Statement/v1" || statement.predicateType !== SLSA_PREDICATE) {
              throw new Error("npm provenance statement has an unexpected type");
            }
            const expectedPurl = `pkg:npm/${PACKAGE_NAME}@${manifest.package.version}`;
            const subjectMatches = statement.subject?.some((subject) => decodedPurl(subject.name) === expectedPurl
              && subject.digest?.sha512 === tarballSha512Hex);
            if (!subjectMatches) throw new Error("npm provenance subject does not bind the validated tgz digest");
            const workflow = statement.predicate?.buildDefinition?.externalParameters?.workflow;
            const workflowPathMatches = workflow?.path === WORKFLOW || workflow?.path === `/${WORKFLOW}`;
            if (workflow?.repository !== `https://github.com/${REPOSITORY}`
              || workflow?.ref !== manifest.source.ref
              || !workflowPathMatches) {
              throw new Error("npm provenance statement does not bind this repository workflow and tag");
            }
            const expectedDependencyUri = `git+https://github.com/${REPOSITORY}@${manifest.source.ref}`;
            const commitMatches = statement.predicate?.buildDefinition?.resolvedDependencies?.some((dependency) =>
              dependency.uri === expectedDependencyUri && dependency.digest?.gitCommit === manifest.source.commit);
            if (!commitMatches) throw new Error("npm provenance statement does not bind the exact candidate repository, ref, and commit");
            const cryptographic = verifySigstoreBundle(provenance.bundle, manifest);
            const bundleSha256 = sha256(JSON.stringify(stable(provenance.bundle)));
            return {
              registry_integrity: dist.integrity,
              attestation_url: attestationUrl.href,
              attestation_sha256: sha256(attestationBytes),
              attestation_bundle_sha256: bundleSha256,
              provenance_predicate_type: provenance.predicateType,
              provenance_subject_sha512: tarballSha512Hex,
              cryptographic_attestation_verified: true,
              raw_and_cryptographic_bundle_match: true,
              cryptographic_attestation_bundle_sha256: bundleSha256,
              sigstore_verifier_version: cryptographic.sigstore_version,
              sigstore_certificate_identity: `https://github.com/${REPOSITORY}/${WORKFLOW}@${manifest.source.ref}`,
            };
          };
          const verifyNpmSignatureAudit = (manifest) => {
            const auditDirectory = mkdtempSync(join(tmpdir(), "hunch-npm-signature-audit-"));
            const auditEnvironment = nonPublishingEnvironment;
            try {
              writeFileSync(join(auditDirectory, "package.json"), JSON.stringify({
                name: "hunch-release-signature-audit",
                version: "0.0.0",
                private: true,
                dependencies: { [PACKAGE_NAME]: manifest.package.version },
              }, null, 2) + "\n");
              const installed = spawnSync("npm", [
                "install", `${PACKAGE_NAME}@${manifest.package.version}`, "--save-exact",
                "--ignore-scripts", "--no-audit", "--no-fund", `--registry=${REGISTRY}`,
              ], {
                cwd: auditDirectory, env: auditEnvironment, encoding: "utf8", timeout: 5 * 60_000, maxBuffer: 16 * 1024 * 1024,
              });
              if (installed.error) throw installed.error;
              if (installed.status !== 0) throw new Error(`scripts-disabled signature-audit install failed: ${`${installed.stderr}\n${installed.stdout}`.trim()}`);
              const installedManifest = JSON.parse(readFileSync(join(
                auditDirectory, "node_modules", "@davesheffer", "hunch", "package.json",
              ), "utf8"));
              if (installedManifest.name !== PACKAGE_NAME || installedManifest.version !== manifest.package.version) {
                throw new Error("signature audit did not install the exact published Hunch version");
              }
              const installedLock = JSON.parse(readFileSync(join(auditDirectory, "package-lock.json"), "utf8"));
              const installedPackage = installedLock.packages?.["node_modules/@davesheffer/hunch"];
              if (installedPackage?.version !== manifest.package.version
                || installedPackage?.integrity !== manifest.artifact.tarball_integrity) {
                throw new Error("signature audit install does not bind the validated Hunch tarball integrity");
              }

              const audited = spawnSync("npm", [
                "audit", "signatures", "--json", `--registry=${REGISTRY}`,
              ], {
                cwd: auditDirectory, env: auditEnvironment, encoding: "utf8", timeout: 5 * 60_000, maxBuffer: 128 * 1024 * 1024,
              });
              if (audited.error) throw audited.error;
              if (audited.status !== 0) throw new Error(`npm cryptographic signature audit failed: ${`${audited.stderr}\n${audited.stdout}`.trim()}`);
              const audit = parseJson(audited.stdout, "npm cryptographic signature audit");
              if (!audit || typeof audit !== "object" || Array.isArray(audit)
                || !Array.isArray(audit.invalid) || !Array.isArray(audit.missing)
                || audit.invalid.length !== 0 || audit.missing.length !== 0) {
                throw new Error("npm cryptographic signature audit reported invalid or missing evidence");
              }
              return {
                registry_signature_audit_verified: true,
                signature_audit_tool: "npm audit signatures",
                signature_audit_sha256: sha256(Buffer.from(audited.stdout)),
                signature_audit_invalid: audit.invalid.length,
                signature_audit_missing: audit.missing.length,
                audited_package_integrity: installedPackage.integrity,
              };
            } finally {
              rmSync(auditDirectory, { recursive: true, force: true });
            }
          };

          const expectedFiles = ["package.tgz", "release-candidate-manifest.json", "release-gate.json"];
          const actualFiles = readdirSync(candidateDirectory).sort();
          if (JSON.stringify(actualFiles) !== JSON.stringify(expectedFiles)) {
            throw new Error(`release candidate artifact has unexpected files: ${actualFiles.join(", ")}`);
          }
          const manifest = JSON.parse(readFileSync(resolve(candidateDirectory, "release-candidate-manifest.json"), "utf8"));
          verifyReceiptHash(manifest, "release candidate manifest");
          if (manifest.schema !== "hunch.npm-release-candidate.v1"
            || manifest.package?.name !== PACKAGE_NAME
            || manifest.source?.repository !== REPOSITORY
            || manifest.source?.commit !== process.env.GITHUB_SHA
            || manifest.source?.ref !== process.env.GITHUB_REF
            || manifest.source?.tag !== process.env.GITHUB_REF_NAME
            || manifest.source?.workflow !== WORKFLOW
            || process.env.GITHUB_REPOSITORY !== REPOSITORY) {
            throw new Error("release candidate manifest does not bind this workflow invocation");
          }
          const version = manifest.package.version;
          const parsedVersion = parseSemver(version);
          const distTag = parsedVersion.prerelease.length === 0 ? "latest" : "next";
          if (manifest.package.dist_tag !== distTag || manifest.source.tag !== `v${version}`
            || manifest.source.ref !== `refs/tags/v${version}`) {
            throw new Error("release candidate version, ref, and dist-tag disagree");
          }

          const tarballBytes = readFileSync(tarballPath);
          const tarballSha256 = sha256(tarballBytes);
          const tarballIntegrity = `sha512-${createHash("sha512").update(tarballBytes).digest("base64")}`;
          const tarballSha512Hex = createHash("sha512").update(tarballBytes).digest("hex");
          if (manifest.artifact?.filename !== "package.tgz"
            || manifest.artifact?.size !== statSync(tarballPath).size
            || manifest.artifact?.tarball_sha256 !== tarballSha256
            || manifest.artifact?.tarball_integrity !== tarballIntegrity) {
            throw new Error("release candidate tgz does not match its content-addressed manifest");
          }
          const packedManifest = inspectPackedManifest();
          if (packedManifest.name !== PACKAGE_NAME || packedManifest.version !== version) {
            throw new Error("release candidate tgz contains an unexpected package identity");
          }
          const packagePaths = inspectPackedPaths();
          const allowedPackagePath = (path) => path === "LICENSE"
            || path === "NOTICE"
            || path === "README.md"
            || path === "package.json"
            || path === "bench/constitution-exp03-v1.json"
            || path === "tooling/competitive-watch.mjs"
            || path === "tooling/md1-benchmark.mjs"
            || /^dist\/.+\.js$/.test(path);
          const sensitivePackagePath = (path) => /(^|\/)\.hunch(?:-cache)?(?:\/|$)/i.test(path)
            || /^wiki(?:\/|$)/i.test(path)
            || /(^|\/)\.env(?:\.|$)/i.test(path)
            || /(^|\/)(?:credentials?|secrets?|id_rsa|id_ed25519)(?:\.|$)/i.test(path)
            || /\.(?:pem|key|p12|pfx)$/i.test(path)
            || path.startsWith("/") || path.includes("\\") || path.split("/").some((part) => part === "." || part === "..");
          const forbiddenPackagePaths = packagePaths.filter((path) => !allowedPackagePath(path) || sensitivePackagePath(path));
          if (forbiddenPackagePaths.length > 0
            || new Set(packagePaths).size !== packagePaths.length
            || !["LICENSE", "NOTICE", "README.md", "package.json", "dist/cli/index.js"].every((path) => packagePaths.includes(path))
            || manifest.artifact?.package_path_manifest_sha256 !== sha256(JSON.stringify(packagePaths))) {
            throw new Error(`release candidate tgz violates the package path allowlist: ${forbiddenPackagePaths.join(", ")}`);
          }

          const releaseGateBytes = readFileSync(resolve(candidateDirectory, "release-gate.json"));
          const releaseGate = JSON.parse(releaseGateBytes);
          const { id: releaseId, content_hash: releaseContentHash, ...releaseBody } = releaseGate;
          const expectedReleaseHash = contentHash(releaseBody);
          if (releaseContentHash !== expectedReleaseHash
            || releaseId !== `release_${expectedReleaseHash.slice("sha256:".length, "sha256:".length + 12)}`
            || releaseGate.result !== "passed" || releaseGate.publish_ready !== true) {
            throw new Error("downloaded release-gate receipt is not valid and publish-ready");
          }
          const { content_hash: matrixContentHash, ...matrixBody } = releaseGate.matrix ?? {};
          if (matrixContentHash !== contentHash(matrixBody)
            || releaseGate.matrix?.result !== "passed" || releaseGate.matrix?.release_ready !== true) {
            throw new Error("downloaded Matrix receipt is not valid and release-ready");
          }
          if (manifest.release_gate?.release_gate_content_hash !== releaseContentHash
            || manifest.release_gate?.matrix_content_hash !== matrixContentHash
            || manifest.release_gate?.matrix_package_sha256 !== tarballSha256
            || manifest.release_gate?.file_sha256 !== sha256(releaseGateBytes)
            || releaseGate.matrix?.packages?.candidate?.sha256 !== tarballSha256
            || releaseGate.source?.commit !== manifest.source.commit
            || releaseGate.matrix?.source?.candidate_commit !== manifest.source.commit) {
            throw new Error("candidate, release-gate, Matrix, and tgz digests do not form one evidence chain");
          }

          const preexisting = exactDist(PACKAGE_NAME, version);
          let publicationMode;
          let requireIntendedTag = false;
          let publishFailure = null;
          if (preexisting) {
            publicationMode = "already-published";
          } else {
            // This is deliberately the final registry operation before publish.
            // Any lookup failure stops the job; a missing intended tag is allowed.
            const beforeTags = distTags(PACKAGE_NAME);
            const current = beforeTags[distTag] ?? null;
            if (current !== null) {
              parseSemver(current);
              if (compareSemver(version, current) <= 0) {
                throw new Error(`candidate version ${version} is not newer than current ${distTag} dist-tag ${current}`);
              }
            }
            const published = spawnSync("npm", ["publish", tarballPath, "--access", "public", "--ignore-scripts", "--provenance", "--tag", distTag, `--registry=${REGISTRY}`], {
              encoding: "utf8", timeout: 5 * 60_000, maxBuffer: 8 * 1024 * 1024,
            });
            if (published.error) throw published.error;
            if (published.status === 0) {
              publicationMode = "published";
              requireIntendedTag = true;
            } else {
              publishFailure = `${published.stderr}\n${published.stdout}`.trim();
              if (!/EPUBLISHCONFLICT|previously published|cannot publish over/i.test(publishFailure)) {
                throw new Error(`npm publish failed: ${publishFailure}`);
              }
              publicationMode = "converged-after-race";
            }
          }

          let verifiedRegistry = null;
          let observedDistTag = null;
          let lastVerificationError = null;
          for (let attempt = 1; attempt <= 12; attempt += 1) {
            try {
              const dist = exactDist(PACKAGE_NAME, version);
              if (!dist) throw new Error(`${PACKAGE_NAME}@${version} is not visible on npm`);
              verifiedRegistry = await verifyRegistryEvidence(dist, manifest, tarballSha512Hex);
              observedDistTag = distTags(PACKAGE_NAME)[distTag] ?? null;
              if (requireIntendedTag && observedDistTag !== version) {
                throw new Error(`new publication did not set ${distTag} to ${version}`);
              }
              lastVerificationError = null;
              break;
            } catch (error) {
              lastVerificationError = error;
              if (attempt < 12) await delay(5_000);
            }
          }
          if (lastVerificationError || !verifiedRegistry) {
            const suffix = publishFailure ? `; publish reported: ${publishFailure}` : "";
            throw new Error(`npm publication verification failed closed: ${lastVerificationError?.message ?? "no evidence"}${suffix}`);
          }
          const signatureAuditEvidence = verifyNpmSignatureAudit(manifest);

          const receiptBody = {
            schema: "hunch.npm-publication.v2",
            mode: publicationMode,
            package: { name: PACKAGE_NAME, version, dist_tag: distTag },
            source: manifest.source,
            release_gate: {
              release_gate_content_hash: releaseContentHash,
              matrix_content_hash: matrixContentHash,
            },
            artifact: {
              tarball_sha256: tarballSha256,
              tarball_integrity: tarballIntegrity,
              package_path_manifest_sha256: manifest.artifact.package_path_manifest_sha256,
              size: tarballBytes.length,
            },
            registry: {
              url: REGISTRY,
              ...verifiedRegistry,
              ...signatureAuditEvidence,
              observed_dist_tag: observedDistTag,
            },
            verified: true,
          };
          writeFileSync(
            "npm-publication-receipt.json",
            JSON.stringify({ ...receiptBody, content_hash: contentHash(receiptBody) }, null, 2) + "\n",
          );
          console.log(`${PACKAGE_NAME}@${version}: ${publicationMode}; registry integrity and provenance verified.`);
          NODE

      - name: Upload npm publication receipt
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: npm-publication-${{ github.ref_name }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: npm-publication-receipt.json
          if-no-files-found: error
          retention-days: 30
