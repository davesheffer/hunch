# Hunch — Release. Publishes to npm WITH provenance (a signed, verifiable
# attestation linking the tarball to this repo + this workflow run) whenever a
# GitHub Release is published. Consumers can verify the package was built here,
# unmodified — the single strongest supply-chain trust signal npm offers.
#
# One-time setup:
#   1. Create an npm Granular Access / Automation token with publish rights for
#      @davesheffer/hunch, store it as the repo secret NPM_TOKEN.
#   2. Cut a release: bump version (`npm version patch`) and push the tag — the
#      tag push publishes. Publishing a GitHub Release (also) works.
# Provenance also needs publishConfig.provenance:true (set in package.json) and
# the id-token:write permission below (OIDC) — both already wired.
name: Release

on:
  release:
    types: [published]
  push:
    tags: ["v*"] # a version-tag push publishes directly — no GitHub Release needed

permissions:
  contents: read
  id-token: write # OIDC — required for npm provenance attestation

# A tag push and a later GitHub Release can target the same version. Serialize
# them so the second run observes the first publication and becomes a green no-op.
concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # release receipt binds HEAD and derives an exact rollback version from tags

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install (locked)
        run: npm ci

      - name: Constitution release gate
        run: npm run gate:release -- --tag "${GITHUB_REF_NAME}" --output release-gate.json

      - name: Upload release-gate receipt
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: constitution-release-gate-${{ github.ref_name }}-${{ github.run_id }}
          path: release-gate.json
          if-no-files-found: error

      # Tag push AND a later GitHub Release for the same version both trigger this
      # workflow — make the second run a green no-op instead of a red "version
      # already exists" publish failure.
      - name: Skip if this version is already on npm
        id: gate
        run: |
          V=$(node -p "require('./package.json').version")
          if [ "$(npm view "@davesheffer/hunch@$V" version 2>/dev/null)" = "$V" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "@davesheffer/hunch@$V already published — skipping."
          fi

      - name: Publish with provenance
        if: steps.gate.outputs.skip != 'true'
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
