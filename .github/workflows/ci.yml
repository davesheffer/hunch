# Hunch — CI. Typecheck, test, build, and a supply-chain audit gate on every
# push to main and every PR. Pairs with hunch-guard.yml (the invariant guard).
name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      # npm ci installs the EXACT, integrity-hashed lockfile tree (no drift,
      # no silent minor bumps) — the deterministic counterpart to `npm install`.
      - name: Install (locked)
        run: npm ci

      # One cross-platform gate is shared by normal CI and the publish workflow:
      # typecheck, full tests, core + VS Code builds, fresh index + conformance, clean tarball
      # rehearsal/privacy sentinel, and production dependency audit. It emits a
      # content-addressed receipt even when a prerequisite fails.
      - name: Constitution release gate
        run: npm run gate:release -- --output release-gate.json

      - name: Upload release-gate receipt
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: constitution-release-gate-${{ github.sha }}
          path: release-gate.json
          if-no-files-found: error

  windows-native-lock:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install (locked)
        run: npm ci

      # Reproduce the original EBUSY class: a live parser process must not hold
      # either installed tree-sitter addon, so both package files remain movable.
      - name: Native bindings remain replaceable during a live parser session
        run: npx --no-install tsx --test test/parse.test.ts
