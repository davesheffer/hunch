<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hunch – Login</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      color-scheme: light dark;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1a2332 100%);
      color: #f8fafc;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      transition: background 0.3s ease;
    }

    @media (prefers-color-scheme: light) {
      body {
        background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
        color: #0f172a;
      }
    }

    .container {
      width: 100%;
      max-width: 400px;
    }

    .logo {
      text-align: center;
      margin-bottom: 3rem;
    }

    .logo-text {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #f8fafc 0%, #cbd5e1 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    @media (prefers-color-scheme: light) {
      .logo-text {
        background: linear-gradient(135deg, #0f172a 0%, #475569 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
    }

    .form-container {
      background: rgba(26, 35, 50, 0.5);
      backdrop-filter: blur(10px);
      border: 1px solid #334155;
      border-radius: 0.75rem;
      padding: 2rem;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    @media (prefers-color-scheme: light) {
      .form-container {
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(10px);
        border: 1px solid #e2e8f0;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
      }
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      font-size: 0.875rem;
      font-weight: 500;
      margin-bottom: 0.5rem;
      color: #f8fafc;
    }

    @media (prefers-color-scheme: light) {
      label {
        color: #1e293b;
      }
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 0.75rem 1rem;
      font-size: 1rem;
      border: 1px solid #334155;
      border-radius: 0.5rem;
      background: #0f172a;
      color: #f8fafc;
      transition: all 0.2s ease;
      font-family: inherit;
    }

    @media (prefers-color-scheme: light) {
      input[type="email"],
      input[type="password"] {
        background: #ffffff;
        color: #0f172a;
        border-color: #e2e8f0;
      }
    }

    input[type="email"]:focus,
    input[type="password"]:focus {
      outline: none;
      border-color: #c97c52;
      box-shadow: 0 0 0 3px rgba(201, 124, 82, 0.1);
    }

    @media (prefers-color-scheme: light) {
      input[type="email"]:focus,
      input[type="password"]:focus {
        border-color: #a2622c;
        box-shadow: 0 0 0 3px rgba(162, 98, 44, 0.1);
      }
    }

    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }

    .checkbox-input {
      position: relative;
      width: 1.25rem;
      height: 1.25rem;
      appearance: none;
      -webkit-appearance: none;
      cursor: pointer;
      border: 1.5px solid #334155;
      border-radius: 0.375rem;
      background: #0f172a;
      transition: all 0.2s ease;
      flex-shrink: 0;
    }

    @media (prefers-color-scheme: light) {
      .checkbox-input {
        background: #ffffff;
        border-color: #e2e8f0;
      }
    }

    .checkbox-input:focus {
      outline: none;
      border-color: #c97c52;
      box-shadow: 0 0 0 3px rgba(201, 124, 82, 0.1);
    }

    @media (prefers-color-scheme: light) {
      .checkbox-input:focus {
        border-color: #a2622c;
        box-shadow: 0 0 0 3px rgba(162, 98, 44, 0.1);
      }
    }

    .checkbox-input:checked {
      background: #c97c52;
      border-color: #c97c52;
    }

    @media (prefers-color-scheme: light) {
      .checkbox-input:checked {
        background: #a2622c;
        border-color: #a2622c;
      }
    }

    .checkbox-input:checked::after {
      content: '✓';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #f8fafc;
      font-size: 0.875rem;
      font-weight: 600;
      line-height: 1;
    }

    .checkbox-label {
      font-size: 0.875rem;
      cursor: pointer;
      user-select: none;
      color: #cbd5e1;
    }

    @media (prefers-color-scheme: light) {
      .checkbox-label {
        color: #64748b;
      }
    }

    .submit-button {
      width: 100%;
      padding: 0.875rem 1.5rem;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 0.5rem;
      background: #c97c52;
      color: #ffffff;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
      font-family: inherit;
    }

    @media (prefers-color-scheme: light) {
      .submit-button {
        background: #a2622c;
      }
    }

    .submit-button:hover {
      transform: translateY(-1px);
    }

    .submit-button:hover::before {
      opacity: 0.3;
    }

    .submit-button:focus {
      outline: none;
      box-shadow: 0 0 0 3px rgba(201, 124, 82, 0.3);
    }

    @media (prefers-color-scheme: light) {
      .submit-button:focus {
        box-shadow: 0 0 0 3px rgba(162, 98, 44, 0.3);
      }
    }

    .submit-button:active {
      transform: translateY(0);
    }

    .submit-button::before {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: rgba(255, 255, 255, 0.5);
      opacity: 0;
      transition: opacity 0.3s ease;
      filter: blur(4px);
    }

    .form-footer {
      margin-top: 1.5rem;
      text-align: center;
    }

    .forgot-password {
      font-size: 0.875rem;
      color: #cbd5e1;
      text-decoration: none;
      transition: color 0.2s ease;
    }

    @media (prefers-color-scheme: light) {
      .forgot-password {
        color: #64748b;
      }
    }

    .forgot-password:hover {
      color: #c97c52;
    }

    @media (prefers-color-scheme: light) {
      .forgot-password:hover {
        color: #a2622c;
      }
    }

    .forgot-password:focus {
      outline: none;
      text-decoration: underline;
    }

    @media (max-width: 600px) {
      .form-container {
        padding: 1.5rem;
      }

      .logo {
        margin-bottom: 2.5rem;
      }

      .logo-text {
        font-size: 1.5rem;
      }

      .form-group {
        margin-bottom: 1.25rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <h1 class="logo-text">Hunch</h1>
    </div>

    <div class="form-container">
      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="email">Email address</label>
          <input
            type="email"
            id="email"
            name="email"
            required
            autocomplete="email"
            placeholder="you@example.com"
          >
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            required
            autocomplete="current-password"
            placeholder="••••••••"
          >
        </div>

        <div class="checkbox-group">
          <input
            type="checkbox"
            id="remember"
            name="remember"
            class="checkbox-input"
            autocomplete="off"
          >
          <label for="remember" class="checkbox-label">Remember me</label>
        </div>

        <button type="submit" class="submit-button">Sign in</button>

        <div class="form-footer">
          <a href="#" class="forgot-password">Forgot your password?</a>
        </div>
      </form>
    </div>
  </div>

  <script>
    const form = document.getElementById('loginForm');

    form.addEventListener('submit', (e) => {
      e.preventDefault();

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const remember = document.getElementById('remember').checked;

      if (email && password) {
        console.log('Login attempt:', { email, remember });
        alert('Login successful! (This is a demo)');
        form.reset();
      } else {
        alert('Please fill in all fields');
      }
    });

    document.querySelector('.forgot-password').addEventListener('click', (e) => {
      e.preventDefault();
      alert('Password reset flow would start here');
    });
  </script>
</body>
</html>
